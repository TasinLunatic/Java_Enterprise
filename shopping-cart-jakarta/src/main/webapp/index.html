<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="cart-container">

    <h1>Shopping Cart</h1>

    <div class="cart-box">

        <table>

            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th>Operation</th>
            </tr>

            <tr>
                <td>cola</td>
                <td>3</td>
                <td>10</td>
                <td>30</td>
                <td>
                    <button>Delete</button>
                </td>
            </tr>

            <tr>
                <td>chips</td>
                <td>6</td>
                <td>8</td>
                <td>48</td>
                <td>
                    <button>Delete</button>
                </td>
            </tr>

        </table>

        <div class="total-section">
            Total Amount: 78 yuan
        </div>

    </div>

</div>

</body>
</html>
