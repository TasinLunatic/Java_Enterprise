<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shopping Cart</title>

    <script src="https://unpkg.com/vue@3"></script>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px;
        }

        .container{
            width: 700px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
        }

        th{
            background: #3498db;
            color: white;
            padding: 12px;
        }

        td{
            text-align: center;
            padding: 12px;
            border-bottom: 1px solid #ddd;
        }

        tr:hover{
            background: #f1f1f1;
        }

        button{
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #c0392b;
        }

        .total{
            margin-top: 20px;
            text-align: right;
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
        }

    </style>

</head>

<body>

<div id="app">

    <div class="container">

        <h2>Shopping Cart</h2>

        <table>

            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Subtotal</th>
                <th>Action</th>
            </tr>

            <tr v-for="(item,index) in goods" :key="index">

                <td>{{item.name}}</td>
                <td>{{item.price}} yuan</td>
                <td>{{item.number}}</td>
                <td>{{item.price * item.number}} yuan</td>

                <td>
                    <button @click="del(index)">Delete</button>
                </td>

            </tr>

        </table>

        <div class="total">
            Total Amount: {{total}} yuan
        </div>

    </div>

</div>

<script>

    const app = Vue.createApp({

        data(){
            return{

                goods:[
                    {name:"cola",price:3,number:10},
                    {name:"chips",price:6,number:8},
                    {name:"cookies",price:5,number:4}
                ],

                total:0
            }
        },

        methods:{

            compute(){

                let sum = 0

                for(let item of this.goods){

                    sum += item.price * item.number
                }

                this.total = sum
            },

            del(index){

                this.goods.splice(index,1)

                this.compute()
            }
        },

        mounted(){

            this.compute()
        }

    })

    app.mount("#app")

</script>

</body>
</html>
