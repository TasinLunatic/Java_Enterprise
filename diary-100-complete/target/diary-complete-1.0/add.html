<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Add Diary</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>📝 Add New Diary</h1>

    <form action="add" method="post" class="form-card">
        <label>Title</label>
        <input type="text" name="title" required>

        <label>Content</label>
        <textarea name="content" rows="6" required></textarea>

        <button type="submit">Save Diary</button>
    </form>

    <a href="list" class="back-link">← Back to List</a>
</div>

</body>
</html>
