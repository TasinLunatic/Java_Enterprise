<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Diary</title>
    <link rel="stylesheet" href="./style.css">

    <script>
        function countChars() {
            let content = document.getElementById("content");
            let counter = document.getElementById("counter");
            counter.innerText = content.value.length + "/200";
        }
    </script>
</head>

<body>

<div class="container">
    <h1>📔 Smart Diary</h1>

    <form action="diary" method="post">

        <label>Title</label>
        <input type="text" name="title" required>

        <label>Date</label>
        <input type="date" name="date" required>

        <label>Author</label>
        <input type="text" name="author">

        <label>Mood</label>
        <select name="mood">
            <option>😊 Happy</option>
            <option>😢 Sad</option>
            <option>😡 Angry</option>
            <option>😴 Tired</option>
            <option>🤩 Excited</option>
        </select>

        <label>Weather</label>
        <input type="text" name="weather" placeholder="e.g. Sunny, Rainy">

        <label>Content</label>
        <textarea id="content" name="content" maxlength="200"
                  onkeyup="countChars()" required></textarea>
        <div id="counter">0/200</div>

        <button type="submit">Save Diary</button>

    </form>
</div>

</body>
</html>
