<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Diary Login</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background"></div>

<div class="login-container">

    <div class="login-box">

        <h1>Smart Diary</h1>

        <p class="welcome-text">
            Login to manage your personal diary
        </p>

        <form action="login" method="post">

            <div class="input-group">
                <input type="text"
                       name="username"
                       placeholder="Username"
                       required>
            </div>

            <div class="input-group">
                <input type="password"
                       name="password"
                       placeholder="Password"
                       required>
            </div>

            <button type="submit">
                Sign In
            </button>

        </form>
    </div>

</div>

</body>
</html>
